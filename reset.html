<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重設密碼｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="reset">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>重設密碼</h1>
    <p>先確認帳號與安全問題，再設定新的密碼。</p>
  </header>

  <main class="page-shell narrow">
    <section id="resetContainer" class="form-card">
      <form id="resetForm">
        <label for="resetUsername">帳號</label>
        <input type="text" id="resetUsername" required />
        <button type="submit" class="button full">確認帳號</button>
      </form>

      <div id="securitySection" class="hidden">
        <p id="securityQuestionText" class="question-text"></p>
        <label for="securityAnswerInput">安全問題答案</label>
        <input type="text" id="securityAnswerInput" required />
        <button type="button" id="checkAnswerBtn" class="button full">送出答案</button>
      </div>

      <div id="newPasswordSection" class="hidden">
        <label for="newPassword">新密碼</label>
        <div class="input-row">
          <input type="password" id="newPassword" required />
          <button type="button" class="icon-button" id="btnTogglePwd">顯示</button>
        </div>
        <button type="button" id="resetPasswordBtn" class="button full">更新密碼</button>
      </div>

      <p id="resetMessage" class="form-message" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>
