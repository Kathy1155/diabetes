<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="login">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>登入</h1>
    <p>登入後可使用紀錄、報表、提醒與個人資料功能。</p>
  </header>

  <main class="page-shell narrow">
    <form id="loginForm" class="form-card">
      <label for="username">帳號</label>
      <input type="text" id="username" autocomplete="username" required />

      <label for="password">密碼</label>
      <div class="input-row">
        <input type="password" id="password" autocomplete="current-password" required />
        <button type="button" class="icon-button" id="btnTogglePwd">顯示</button>
      </div>

      <a class="text-link" href="reset.html">忘記密碼？</a>
      <button type="submit" class="button full">登入</button>
      <p id="loginMessage" class="form-message" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
