<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>健康諮詢｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="consult">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>健康諮詢留言</h1>
    <p>記錄想詢問醫護人員或營養師的問題，方便下次諮詢時查看。</p>
  </header>

  <main class="page-shell narrow">
    <form id="consultForm" class="form-card">
      <label for="questionInput">諮詢問題</label>
      <textarea id="questionInput" rows="4" placeholder="請輸入你的問題..." required></textarea>
      <button type="submit" class="button full">送出問題</button>
    </form>

    <section class="list-panel">
      <h2>所有留言</h2>
      <div id="consultList"></div>
    </section>
  </main>
</body>
</html>
