<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>趨勢報表｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="node_modules/chart.js/dist/chart.umd.js"></script>
  <script src="script.js" defer></script>
</head>
<body data-page="report">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>血糖趨勢報表</h1>
    <p>將每日紀錄整理為表格與折線圖，方便觀察血糖變化。</p>
  </header>

  <main class="page-shell">
    <section class="summary-grid" id="reportSummary"></section>

    <section class="chart-card">
      <div class="section-title-row">
        <h2>血糖折線圖</h2>
        <button id="btnExportCSV" class="button secondary">下載紀錄</button>
      </div>
      <canvas id="glucoseChart" height="120"></canvas>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>體重</th>
            <th>運動</th>
            <th>用藥</th>
            <th>飯前血糖</th>
            <th>飯後血糖</th>
            <th>狀態</th>
            <th>備註</th>
          </tr>
        </thead>
        <tbody id="reportBody"></tbody>
      </table>
    </section>
  </main>
</body>
</html>
