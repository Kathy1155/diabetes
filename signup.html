<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>註冊帳號｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="signup">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>註冊帳號</h1>
    <p>建立帳號後，即可開始記錄血糖、用藥與個人健康資料。</p>
  </header>

  <main class="page-shell narrow">
    <form id="signupForm" class="form-card">
      <label for="username">帳號</label>
      <input type="text" id="username" autocomplete="username" required />

      <label for="password">密碼</label>
      <div class="input-row">
        <input type="password" id="password" autocomplete="new-password" required />
        <button type="button" class="icon-button" id="btnTogglePwd">顯示</button>
      </div>

      <label for="securityQuestion">安全問題</label>
      <select id="securityQuestion" required>
        <option value="" disabled selected>請選擇安全問題</option>
        <option value="pet">你第一隻寵物的名字是什麼？</option>
        <option value="food">你最喜歡的食物是什麼？</option>
        <option value="movie">你最喜歡的電影是什麼？</option>
      </select>

      <label for="securityAnswer">安全問題答案</label>
      <input type="text" id="securityAnswer" required />

      <button type="submit" class="button full">建立帳號</button>
      <p id="message" class="form-message" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
