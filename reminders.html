<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用藥提醒｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="reminders">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>用藥提醒</h1>
    <p>設定提醒時間與週期，並追蹤今天是否已服用。</p>
  </header>

  <main class="page-shell two-column">
    <section class="form-card">
      <h2>新增提醒</h2>
      <p id="notifStatus" class="muted"></p>
      <div class="button-row">
        <button id="btnAskPerm" class="button secondary" type="button">允許瀏覽器通知</button>
        <button id="btnTestNotif" class="button secondary" type="button">測試通知</button>
      </div>

      <form id="reminderForm">
        <label for="r_title">提醒內容</label>
        <input type="text" id="r_title" required placeholder="例如：早餐後服藥" />

        <label for="r_time">提醒時間</label>
        <input type="time" id="r_time" required />

        <label>重複日期</label>
        <div class="week-grid">
          <label><input type="checkbox" name="r_days" value="1" />一</label>
          <label><input type="checkbox" name="r_days" value="2" />二</label>
          <label><input type="checkbox" name="r_days" value="3" />三</label>
          <label><input type="checkbox" name="r_days" value="4" />四</label>
          <label><input type="checkbox" name="r_days" value="5" />五</label>
          <label><input type="checkbox" name="r_days" value="6" />六</label>
          <label><input type="checkbox" name="r_days" value="0" />日</label>
        </div>
        <label class="choice"><input type="checkbox" id="r_everyday" />每天</label>

        <button class="button full" type="submit">新增提醒</button>
      </form>
    </section>

    <section class="stack">
      <div class="list-panel">
        <div class="section-title-row">
          <h2>提醒清單</h2>
          <button id="btnExportICS" class="button secondary" type="button">加入行事曆</button>
        </div>
        <p id="remindersEmpty" class="muted">目前沒有提醒。</p>
        <div id="remindersList" class="list"></div>
      </div>

      <div class="list-panel">
        <h2>今日用藥</h2>
        <div id="todayMeds"></div>
      </div>
    </section>
  </main>
</body>
</html>
