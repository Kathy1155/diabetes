<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>填寫紀錄｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="record">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>每日健康紀錄</h1>
    <p>記錄血糖、體重、運動與用藥狀態，建立後續報表資料。</p>
  </header>

  <main class="page-shell narrow">
    <p id="formMessage" class="form-message center" aria-live="polite"></p>

    <form id="recordForm" class="form-card" novalidate>
      <label for="date">日期</label>
      <input type="date" id="date" name="date" required />

      <label for="weight">體重（kg）</label>
      <input type="number" id="weight" name="weight" inputmode="decimal" step="0.1" min="20" max="400" placeholder="例如：65.5" required />

      <fieldset>
        <legend>今天有運動嗎？</legend>
        <label class="choice"><input type="radio" id="exercise_yes" name="exercise" value="yes" />有</label>
        <label class="choice"><input type="radio" id="exercise_no" name="exercise" value="no" checked />沒有</label>
      </fieldset>
      <input type="text" id="exercise_detail" name="exercise_detail" placeholder="例如：散步 30 分鐘" class="hidden" disabled />

      <fieldset>
        <legend>今天有用藥嗎？</legend>
        <label class="choice"><input type="radio" id="med_yes" name="medication" value="yes" />有</label>
        <label class="choice"><input type="radio" id="med_no" name="medication" value="no" checked />沒有</label>
      </fieldset>

      <div id="medicationFields" class="field-group hidden">
        <label for="medication_time">用藥時間</label>
        <input type="time" id="medication_time" name="medication_time" disabled />

        <label for="medication_name">藥物名稱</label>
        <input type="text" id="medication_name" name="medication_name" placeholder="例如：Metformin" disabled />
      </div>

      <label for="bf_glucose">飯前血糖（mg/dL）</label>
      <input type="number" id="bf_glucose" name="bf_glucose" inputmode="numeric" min="50" max="600" step="1" required />

      <label for="af_glucose">飯後血糖（mg/dL）</label>
      <input type="number" id="af_glucose" name="af_glucose" inputmode="numeric" min="50" max="600" step="1" required />

      <label for="remark">備註</label>
      <textarea id="remark" name="remark" rows="3" placeholder="可記錄飲食、症狀或其他觀察"></textarea>

      <div class="button-row">
        <button type="submit" class="button">儲存紀錄</button>
        <button type="button" id="clearBtn" class="button secondary">清除表單</button>
      </div>
    </form>
  </main>
</body>
</html>
