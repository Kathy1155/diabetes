<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>編輯個人資料｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="profile">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>編輯個人資料</h1>
    <p>補充健康背景，讓紀錄內容更完整。</p>
  </header>

  <main class="page-shell narrow">
    <form id="profileForm" class="form-card">
      <label for="name">姓名</label>
      <input type="text" id="name" name="name" required />

      <label for="email">電子郵件</label>
      <input type="email" id="email" name="email" required />

      <label for="phone">電話</label>
      <input type="tel" id="phone" name="phone" required />

      <label for="birth">生日</label>
      <input type="date" id="birth" name="birth" required />

      <label for="gender">性別</label>
      <select id="gender" name="gender" required>
        <option value="">請選擇</option>
        <option value="女性">女性</option>
        <option value="男性">男性</option>
        <option value="其他">其他</option>
      </select>

      <fieldset>
        <legend>糖尿病類型</legend>
        <label class="choice"><input type="radio" name="diabetesType" value="第一型糖尿病" required />第一型糖尿病</label>
        <label class="choice"><input type="radio" name="diabetesType" value="第二型糖尿病" />第二型糖尿病</label>
        <label class="choice"><input type="radio" name="diabetesType" value="妊娠糖尿病" />妊娠糖尿病</label>
        <label class="choice"><input type="radio" name="diabetesType" value="其他" />其他</label>
      </fieldset>
      <input type="text" id="diabetesTypeOther" name="diabetesTypeOther" class="hidden" placeholder="請輸入其他類型" />

      <label for="treatment">目前治療方式</label>
      <input type="text" id="treatment" name="treatment" placeholder="例如：飲食控制、運動、口服藥、胰島素" required />

      <label for="diagnosisDate">確診時間</label>
      <input type="date" id="diagnosisDate" name="diagnosisDate" required />

      <label for="familyHistory">家族病史</label>
      <select id="familyHistory" name="familyHistory" required>
        <option value="">請選擇</option>
        <option value="有">有</option>
        <option value="沒有">沒有</option>
        <option value="不確定">不確定</option>
      </select>

      <button type="submit" class="button full">儲存資料</button>
      <p id="profileMessage" class="form-message" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
