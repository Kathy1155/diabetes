<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>帳號中心｜糖尿病健康管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="account">
  <header class="site-header compact">
    <nav id="navbar" class="navbar" aria-label="主選單"></nav>
    <h1>帳號中心</h1>
    <p>查看個人資料、健康背景與帳號設定。</p>
  </header>

  <main class="page-shell two-column">
    <section class="list-panel">
      <div class="section-title-row">
        <h2>個人資料</h2>
        <button id="profileBtn" class="button secondary" type="button">編輯資料</button>
      </div>
      <dl class="profile-list">
        <div><dt>姓名</dt><dd id="name">尚未填寫</dd></div>
        <div><dt>電子郵件</dt><dd id="email">尚未填寫</dd></div>
        <div><dt>電話</dt><dd id="phone">尚未填寫</dd></div>
        <div><dt>生日</dt><dd id="birth">尚未填寫</dd></div>
        <div><dt>性別</dt><dd id="gender">尚未填寫</dd></div>
        <div><dt>糖尿病類型</dt><dd id="diabetesType">尚未填寫</dd></div>
        <div><dt>目前治療方式</dt><dd id="treatment">尚未填寫</dd></div>
        <div><dt>確診時間</dt><dd id="diagnosisDate">尚未填寫</dd></div>
        <div><dt>家族病史</dt><dd id="familyHistory">尚未填寫</dd></div>
      </dl>
    </section>

    <section class="form-card">
      <h2>修改密碼</h2>
      <form id="changePasswordForm">
        <label for="oldPassword">目前密碼</label>
        <input type="password" id="oldPassword" required />

        <label for="newPassword">新密碼</label>
        <input type="password" id="newPassword" required />

        <label for="confirmPassword">確認新密碼</label>
        <input type="password" id="confirmPassword" required />

        <button type="submit" class="button full">更新密碼</button>
        <p id="changePasswordMessage" class="form-message" aria-live="polite"></p>
      </form>
      <button id="logoutBtn" class="button danger full" type="button">登出</button>
    </section>
  </main>
</body>
</html>
